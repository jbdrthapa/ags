<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background -->
  <rect x="0" y="0" width="256" height="256" fill="none"/>

  <!-- Shell icon -->
  <g transform="translate(40,40)">
    <!-- Shell segments -->
    <path d="M40 144 L72 40 L104 40 L72 144 Z" fill="#F6D32D"/>
    <path d="M72 144 L104 40 L136 40 L104 144 Z" fill="#F9A825"/>
    <path d="M104 144 L136 40 L168 40 L136 144 Z" fill="#E53935"/>
    <path d="M136 144 L168 40 L200 40 L168 144 Z" fill="#1E88E5"/>

    <!-- Terminal glyph in center -->
    <g transform="translate(88,88)">
      <path d="M0 0 L16 16 L0 32" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="24" y1="16" x2="40" y2="16" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- js-shell text -->
  <g transform="translate(40,200)">
    <!-- js- -->
    <text x="0" y="0"
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="32"
          font-weight="600"
          fill="#F6D32D">
      js
    </text>
    <text x="52" y="0"
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="32"
          font-weight="600"
          fill="#FFFFFF">
      -
    </text>
    <!-- shell -->
    <text x="72" y="0"
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="32"
          font-weight="600"
          fill="#D3D7CF">
      shell
    </text>
  </g>
</svg>