<!-- type_battery_high_detail.svg -->
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

  <!-- Outer battery shell -->
  <rect x="12" y="14" width="40" height="32" rx="4" fill="#ffffff"/>

  <!-- Positive terminal -->
  <rect x="52" y="22" width="4" height="16" rx="2" fill="#ffffff"/>

  <!-- Inner energy core (accent) -->
  <rect x="18" y="20" width="28" height="20" rx="3" fill="#57e389"/>

  <!-- Energy bars for high detail -->
  <rect x="20" y="22" width="24" height="3" rx="2" fill="#ffffff" opacity="0.35"/>
  <rect x="20" y="27" width="24" height="3" rx="2" fill="#ffffff" opacity="0.35"/>
  <rect x="20" y="32" width="24" height="3" rx="2" fill="#ffffff" opacity="0.35"/>

  <!-- Energy nucleus -->
  <circle cx="32" cy="30" r="4" fill="#ffffff" opacity="0.6"/>

</svg>
